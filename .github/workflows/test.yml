name: Fast Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Static checks from the fast suite (no Claude Code CLI on GitHub-hosted runners).
      # Run the full fast suite locally: ./tests/claude-code/run-skill-tests.sh
      - name: Run fast static checks
        run: |
          chmod +x tests/claude-code/run-skill-tests.sh
          chmod +x tests/claude-code/test-*.sh
          ./tests/claude-code/run-skill-tests.sh --test test-namespace-consistency.sh
